services:
  web:
    image: ${IMAGE_NAME:-ghcr.io/egschipp/gsplayer20}:${IMAGE_TAG:-latest}
    container_name: gsplayer20
    env_file:
      - .env
    volumes:
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --timeout=3 http://127.0.0.1:3000/api/version >/dev/null 2>&1 || exit 1"
        ]
      start_period: 120s
      interval: 10s
      timeout: 3s
      retries: 12
    networks:
      - web

  worker:
    image: ${IMAGE_NAME:-ghcr.io/egschipp/gsplayer20}:${IMAGE_TAG:-latest}
    container_name: gsplayer20-worker
    command: ["node", "worker.js"]
    env_file:
      - .env
    volumes:
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    external: true
