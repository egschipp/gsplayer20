name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "db/**"
      - "lib/**"
      - "pages/**"
      - "public/**"
      - "types/**"
      - "infra/**"
      - "Dockerfile"
      - ".dockerignore"
      - "worker.js"
      - ".github/workflows/deploy.yml"
      - "package.json"
      - "package-lock.json"
      - "next.config.js"
      - "tsconfig.json"
  workflow_dispatch: {}
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "db/**"
      - "lib/**"
      - "pages/**"
      - "public/**"
      - "types/**"
      - "infra/**"
      - "Dockerfile"
      - ".dockerignore"
      - "worker.js"
      - ".github/workflows/deploy.yml"
      - "package.json"
      - "package-lock.json"
      - "next.config.js"
      - "tsconfig.json"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    if: github.event_name == 'pull_request' && github.actor != 'release-please[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Dependency audit (high+)
        run: npm audit --omit=dev --audit-level=high

  build:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}:${{ github.sha }}
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  deploy:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        id: app_version
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");

          async function main() {
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const fallbackVersion = String(pkg.version || "0.0.0").replace(/^v/i, "").trim();
            const repo = String(process.env.GITHUB_REPOSITORY || "").trim();
            const token = String(process.env.GITHUB_TOKEN || "").trim();

            if (!repo || !token) {
              process.stdout.write(`value=${fallbackVersion}\n`);
              return;
            }

            try {
              const res = await fetch(`https://api.github.com/repos/${repo}/releases/latest`, {
                headers: {
                  Accept: "application/vnd.github+json",
                  Authorization: `Bearer ${token}`,
                  "User-Agent": "gsplayer20-deploy-version",
                },
                cache: "no-store",
              });

              if (!res.ok) {
                process.stdout.write(`value=${fallbackVersion}\n`);
                return;
              }

              const data = await res.json();
              const tag = String(data?.tag_name || "")
                .trim()
                .replace(/^v/i, "");
              if (tag) {
                process.stdout.write(`value=${tag}\n`);
                return;
              }
            } catch {
              // fall back to package.json version
            }

            process.stdout.write(`value=${fallbackVersion}\n`);
          }

          main();
          NODE

      - name: Validate APP_ENCRYPTION_KEY
        env:
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          import sys

          key = os.environ.get("APP_ENCRYPTION_KEY", "")
          try:
            raw = base64.b64decode(key, validate=True)
          except Exception:
            print("APP_ENCRYPTION_KEY is not valid base64", file=sys.stderr)
            sys.exit(1)

          if len(raw) != 32:
            print("APP_ENCRYPTION_KEY must decode to 32 bytes", file=sys.stderr)
            sys.exit(1)
          PY

      - name: Deploy on self-hosted runner
        env:
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          IMAGE_NAME: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}
          IMAGE_TAG: ${{ github.sha }}
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          APP_PIN: ${{ secrets.APP_PIN }}
          AUTH_URL: ${{ secrets.AUTH_URL || secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || secrets.AUTH_URL }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          DB_PATH: /data/gsplayer.sqlite
          APP_RELEASE_VERSION: ${{ steps.app_version.outputs.value }}
        run: |
          set -euo pipefail
          cd "${DEPLOY_DIR}"
          if [ -n "${DOCKER_PASSWORD:-}" ]; then
            echo "$DOCKER_PASSWORD" | docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin
          fi
          if [ -z "${IMAGE_NAME:-}" ] || [ -z "${IMAGE_TAG:-}" ]; then
            echo "IMAGE_NAME/IMAGE_TAG ontbreekt" >&2
            exit 1
          fi
          if ! command -v flock >/dev/null 2>&1; then
            echo "flock ontbreekt op target host" >&2
            exit 1
          fi
          exec 9>.deploy.lock
          flock -n 9 || { echo "Deploy al bezig"; exit 1; }
          tmp_env="$(mktemp .env.tmp.XXXXXX)"
          cat > "$tmp_env" <<EOF
          APP_ENV=production
          APP_ENCRYPTION_KEY=$APP_ENCRYPTION_KEY
          IMAGE_NAME=$IMAGE_NAME
          IMAGE_TAG=$IMAGE_TAG
          SPOTIFY_CLIENT_ID=$SPOTIFY_CLIENT_ID
          SPOTIFY_CLIENT_SECRET=$SPOTIFY_CLIENT_SECRET
          SPOTIFY_REDIRECT_URI=$SPOTIFY_REDIRECT_URI
          AUTH_SECRET=$AUTH_SECRET
          APP_PIN=$APP_PIN
          AUTH_URL=$AUTH_URL
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          NEXTAUTH_URL=$NEXTAUTH_URL
          TOKEN_ENCRYPTION_KEY=$TOKEN_ENCRYPTION_KEY
          DB_PATH=$DB_PATH
          APP_RELEASE_VERSION=$APP_RELEASE_VERSION
          EOF
          chmod 600 "$tmp_env"
          mv "$tmp_env" .env
          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose v2 not available" >&2
            exit 1
          fi
          COMPOSE_FILE_PATH="docker-compose.ci.yml"
          cat > "${COMPOSE_FILE_PATH}" <<'YAML'
          services:
            web:
              image: ${IMAGE_NAME}:${IMAGE_TAG}
              container_name: gsplayer20
              env_file:
                - .env
              volumes:
                - ./data:/data
              logging:
                driver: json-file
                options:
                  max-size: "10m"
                  max-file: "3"
              restart: unless-stopped
              networks:
                - web

            worker:
              image: ${IMAGE_NAME}:${IMAGE_TAG}
              container_name: gsplayer20-worker
              command: ["node", "worker.js"]
              env_file:
                - .env
              volumes:
                - ./data:/data
              logging:
                driver: json-file
                options:
                  max-size: "10m"
                  max-file: "3"
              restart: unless-stopped
              networks:
                - web

          networks:
            web:
              external: true
          YAML
          docker network inspect web >/dev/null 2>&1 || docker network create web
          echo "Compose file: ${COMPOSE_FILE_PATH}"
          docker compose -f "${COMPOSE_FILE_PATH}" config | grep -E "image:" || true
          docker compose -f "${COMPOSE_FILE_PATH}" pull web worker
          if ! docker compose -f "${COMPOSE_FILE_PATH}" up -d --remove-orphans; then
            docker compose -f "${COMPOSE_FILE_PATH}" ps
            docker compose -f "${COMPOSE_FILE_PATH}" logs --no-color --tail=160 web worker || true
            exit 1
          fi
