name: Automated Release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: automated-release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate next SemVer
        id: semver
        run: |
          set -euo pipefail
          git fetch --tags origin
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { execSync } = require("node:child_process");
          const fs = require("node:fs");

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const currentVersion = String(pkg.version || "0.0.0");
          const tagList = execSync(
            "git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname",
            { encoding: "utf8" }
          )
            .trim()
            .split("\n")
            .filter(Boolean);
          const latestTag = tagList[0] || "";
          const range = latestTag ? `${latestTag}..HEAD` : "HEAD";
          const lines = execSync(`git log --format=%s%x1f%b%x1e ${range}`, {
            encoding: "utf8",
          })
            .split("\x1e")
            .map((entry) => entry.trim())
            .filter(Boolean);

          let hasReleaseCandidateCommit = false;
          let bumpLevel = -1; // -1 none, 0 patch, 1 minor, 2 major

          for (const entry of lines) {
            const [subjectRaw = "", bodyRaw = ""] = entry.split("\x1f");
            const subject = subjectRaw.trim();
            const body = bodyRaw.trim();
            if (!subject || /^chore\(release\):/i.test(subject)) continue;
            hasReleaseCandidateCommit = true;
            const isBreaking =
              /(^|[a-z]+(\([^)]+\))?)!:/i.test(subject) ||
              /BREAKING CHANGE:/i.test(body);
            if (isBreaking) {
              bumpLevel = Math.max(bumpLevel, 2);
              continue;
            }
            const isFeature = /^feat(\([^)]+\))?:/i.test(subject);
            if (isFeature) {
              bumpLevel = Math.max(bumpLevel, 1);
              continue;
            }
            bumpLevel = Math.max(bumpLevel, 0);
          }

          if (!hasReleaseCandidateCommit) {
            process.stdout.write("should_release=false\n");
            process.stdout.write(`version=${currentVersion}\n`);
            process.exit(0);
          }

          const source = (latestTag || `v${currentVersion}`).replace(/^v/, "");
          const [major, minor, patch] = source.split(".").map((n) => Number(n) || 0);
          let nextMajor = major;
          let nextMinor = minor;
          let nextPatch = patch;

          if (bumpLevel === 2) {
            nextMajor += 1;
            nextMinor = 0;
            nextPatch = 0;
          } else if (bumpLevel === 1) {
            nextMinor += 1;
            nextPatch = 0;
          } else {
            nextPatch += 1;
          }

          const nextVersion = `${nextMajor}.${nextMinor}.${nextPatch}`;
          process.stdout.write("should_release=true\n");
          process.stdout.write(`version=${nextVersion}\n`);
          NODE

      - name: Create and push release tag
        if: steps.semver.outputs.should_release == 'true'
        env:
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          git fetch --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 0
          fi
          npm version "${VERSION}" --no-git-tag-version
          node <<'NODE'
          const fs = require("node:fs");
          const path = ".release-please-manifest.json";
          if (!fs.existsSync(path)) process.exit(0);
          const data = JSON.parse(fs.readFileSync(path, "utf8"));
          data["."] = process.env.VERSION;
          fs.writeFileSync(path, `${JSON.stringify(data, null, 2)}\n`);
          NODE
          if ! git diff --quiet -- package.json package-lock.json .release-please-manifest.json; then
            git add package.json package-lock.json .release-please-manifest.json
            git commit -m "chore(release): v${VERSION}"
            git push origin HEAD:main
          fi
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        if: steps.semver.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          REPO="${GITHUB_REPOSITORY}"
          for attempt in 1 2 3 4 5; do
            if gh api "repos/${REPO}/releases/tags/${TAG}" >/dev/null 2>&1; then
              echo "Release ${TAG} already exists."
              exit 0
            fi
            status="$(gh api "repos/${REPO}/releases/tags/${TAG}" --silent >/dev/null 2>&1; echo $?)"
            # Exit code 1 can be both "not found" and transient API failures; continue to create flow.
            if [ "${status}" -eq 0 ]; then
              break
            fi
            echo "Release lookup attempt ${attempt} inconclusive; retrying..."
            sleep $((attempt * 2))
          done

          for attempt in 1 2 3 4 5; do
            if gh release create "${TAG}" --title "${TAG}" --generate-notes; then
              echo "Created release ${TAG}."
              exit 0
            fi
            if gh release view "${TAG}" >/dev/null 2>&1; then
              echo "Release ${TAG} became available after failed create attempt."
              exit 0
            fi
            echo "Create release attempt ${attempt} failed; retrying..."
            sleep $((attempt * 3))
          done

          echo "Failed to create GitHub release ${TAG} after retries."
          exit 1
