name: Automated Release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: automated-release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate next SemVer
        id: semver
        run: |
          set -euo pipefail
          git fetch --tags origin
          node scripts/release/plan-release.mjs >> "$GITHUB_OUTPUT"

      - name: Show release plan
        run: |
          echo "Base version: ${{ steps.semver.outputs.base_version }}"
          echo "Bump level:   ${{ steps.semver.outputs.bump }}"
          echo "Next version: ${{ steps.semver.outputs.version }}"

      - name: Create and push release tag
        if: steps.semver.outputs.should_release == 'true'
        env:
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          set -euo pipefail
          case "${VERSION}" in
            ''|*[!0-9.]*|*.*.*.*) echo "Invalid semver version: ${VERSION}" >&2; exit 1 ;;
          esac
          TAG="v${VERSION}"
          git fetch --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 0
          fi
          node scripts/release/apply-version.mjs "${VERSION}"
          npm install --package-lock-only --ignore-scripts
          if ! git diff --quiet -- package.json package-lock.json .release-please-manifest.json; then
            git add package.json package-lock.json .release-please-manifest.json
            git commit -m "chore(release): v${VERSION}"
            git push origin HEAD:main
          fi
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        if: steps.semver.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          REPO="${GITHUB_REPOSITORY}"
          for attempt in 1 2 3 4 5; do
            if gh api "repos/${REPO}/releases/tags/${TAG}" >/dev/null 2>&1; then
              echo "Release ${TAG} already exists."
              exit 0
            fi
            status="$(gh api "repos/${REPO}/releases/tags/${TAG}" --silent >/dev/null 2>&1; echo $?)"
            # Exit code 1 can be both "not found" and transient API failures; continue to create flow.
            if [ "${status}" -eq 0 ]; then
              break
            fi
            echo "Release lookup attempt ${attempt} inconclusive; retrying..."
            sleep $((attempt * 2))
          done

          for attempt in 1 2 3 4 5; do
            if gh release create "${TAG}" --title "${TAG}" --generate-notes; then
              echo "Created release ${TAG}."
              exit 0
            fi
            if gh release view "${TAG}" >/dev/null 2>&1; then
              echo "Release ${TAG} became available after failed create attempt."
              exit 0
            fi
            echo "Create release attempt ${attempt} failed; retrying..."
            sleep $((attempt * 3))
          done

          echo "Failed to create GitHub release ${TAG} after retries."
          exit 1
